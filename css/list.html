<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        ul {
            list-style: none;
        }
        .list {
            counter-reset: item
        }

        .list li {
            counter-increment: item;
        }

        .list li::before {
            content: counter(item) ". ";
            color: red;
        }
    </style>
</head>
<body>
    <ul class="list">
        <li>HTML</li>
        <li>CSS</li>
        <li>Javascript</li>
    </ul>
</body>
</html>
